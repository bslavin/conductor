# Conductor — Master Compose File
# Deploy on Proxmox Ubuntu VM
# Usage: docker compose up -d
# Individual services: docker compose up -d mem0 infisical

x-common: &common
  restart: unless-stopped
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

services:
  # ============================================
  # SHARED MEMORY — Mem0
  # ============================================
  mem0-db:
    <<: *common
    image: ankane/pgvector:latest
    container_name: conductor-mem0-db
    environment:
      POSTGRES_USER: ${MEM0_DB_USER:-mem0}
      POSTGRES_PASSWORD: ${MEM0_DB_PASSWORD}
      POSTGRES_DB: ${MEM0_DB_NAME:-mem0}
    volumes:
      - mem0_pgdata:/var/lib/postgresql/data
    networks:
      - mem0
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${MEM0_DB_USER:-mem0}"]
      interval: 10s
      timeout: 5s
      retries: 5

  mem0-neo4j:
    <<: *common
    image: neo4j:5-community
    container_name: conductor-mem0-neo4j
    environment:
      NEO4J_AUTH: neo4j/${MEM0_NEO4J_PASSWORD}
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - mem0_neo4j_data:/data
    networks:
      - mem0
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 15s
      timeout: 10s
      retries: 5

  mem0:
    <<: *common
    build:
      context: ./services/mem0
    container_name: conductor-mem0
    ports:
      - "${MEM0_PORT:-8070}:8080"
    environment:
      MEM0_DB_USER: ${MEM0_DB_USER:-mem0}
      MEM0_DB_PASSWORD: ${MEM0_DB_PASSWORD}
      MEM0_DB_NAME: ${MEM0_DB_NAME:-mem0}
      MEM0_DB_HOST: mem0-db
      MEM0_GRAPH_STORE_URL: bolt://mem0-neo4j:7687
      MEM0_GRAPH_STORE_PASSWORD: ${MEM0_NEO4J_PASSWORD}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    depends_on:
      mem0-db:
        condition: service_healthy
      mem0-neo4j:
        condition: service_healthy
    networks:
      - mem0
      - proxy

  # ============================================
  # SECRETS — Infisical
  # ============================================
  infisical-db:
    <<: *common
    image: postgres:14-alpine
    container_name: conductor-infisical-db
    environment:
      POSTGRES_USER: ${INFISICAL_DB_USER:-infisical}
      POSTGRES_PASSWORD: ${INFISICAL_DB_PASSWORD}
      POSTGRES_DB: ${INFISICAL_DB_NAME:-infisical}
    volumes:
      - infisical_pgdata:/var/lib/postgresql/data
    networks:
      - infisical
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${INFISICAL_DB_USER:-infisical}"]
      interval: 10s
      timeout: 5s
      retries: 5

  infisical-redis:
    <<: *common
    image: redis:7-alpine
    container_name: conductor-infisical-redis
    volumes:
      - infisical_redis:/data
    networks:
      - infisical
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  infisical:
    <<: *common
    image: infisical/infisical:latest
    container_name: conductor-infisical
    ports:
      - "${INFISICAL_PORT:-8080}:8080"
    environment:
      NODE_ENV: production
      DB_CONNECTION_URI: postgresql://${INFISICAL_DB_USER:-infisical}:${INFISICAL_DB_PASSWORD}@infisical-db:5432/${INFISICAL_DB_NAME:-infisical}
      REDIS_URL: redis://infisical-redis:6379
      ENCRYPTION_KEY: ${INFISICAL_ENCRYPTION_KEY}
      AUTH_SECRET: ${INFISICAL_AUTH_SECRET}
      SITE_URL: ${INFISICAL_SITE_URL:-http://localhost:8080}
      SMTP_HOST: ${INFISICAL_SMTP_HOST:-}
      SMTP_PORT: ${INFISICAL_SMTP_PORT:-587}
      SMTP_FROM_ADDRESS: ${INFISICAL_SMTP_FROM_ADDRESS:-}
      SMTP_FROM_NAME: ${INFISICAL_SMTP_FROM_NAME:-Infisical}
      SMTP_USERNAME: ${INFISICAL_SMTP_USERNAME:-}
      SMTP_PASSWORD: ${INFISICAL_SMTP_PASSWORD:-}
      OTEL_TELEMETRY_COLLECTION_ENABLED: "false"
    depends_on:
      infisical-db:
        condition: service_healthy
      infisical-redis:
        condition: service_healthy
    networks:
      - infisical
      - proxy

  # ============================================
  # SSL PROXY — HTTPS termination for Infisical
  # ============================================
  infisical-ssl:
    <<: *common
    image: nginx:alpine
    container_name: conductor-ssl-proxy
    ports:
      - "8443:8443"
    volumes:
      - /etc/ssl/conductor:/etc/ssl/conductor:ro
      - ./services/ssl-proxy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - proxy
    depends_on:
      - infisical

  # ============================================
  # REVERSE PROXY — Nginx Proxy Manager
  # ============================================
  nginx-proxy-manager:
    <<: *common
    image: jc21/nginx-proxy-manager:latest
    container_name: conductor-npm
    ports:
      - "80:80"
      - "443:443"
      - "81:81"  # Admin UI
    volumes:
      - npm_data:/data
      - npm_letsencrypt:/etc/letsencrypt
    networks:
      - proxy

  # ============================================
  # TOOLS
  # ============================================
  google-ads-mcp:
    <<: *common
    image: google-ads-mcp:latest
    container_name: conductor-google-ads-mcp
    build:
      context: ./services/google-ads-mcp
      dockerfile: Dockerfile
    ports:
      - "${GOOGLE_ADS_MCP_PORT:-3100}:3000"
    environment:
      GOOGLE_ADS_DEVELOPER_TOKEN: ${GOOGLE_ADS_DEVELOPER_TOKEN}
      GOOGLE_ADS_CLIENT_ID: ${GOOGLE_ADS_CLIENT_ID}
      GOOGLE_ADS_CLIENT_SECRET: ${GOOGLE_ADS_CLIENT_SECRET}
      GOOGLE_ADS_REFRESH_TOKEN: ${GOOGLE_ADS_REFRESH_TOKEN}
      GOOGLE_ADS_CUSTOMER_ID: ${GOOGLE_ADS_CUSTOMER_ID}
    networks:
      - proxy

volumes:
  mem0_pgdata:
  mem0_neo4j_data:
  infisical_pgdata:
  infisical_redis:
  npm_data:
  npm_letsencrypt:

networks:
  mem0:
    driver: bridge
  infisical:
    driver: bridge
  proxy:
    driver: bridge
